<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Waypoint mark (ADR: logo direction A) — a map marker (teal = place) with a
       glowing amber core (amber = the live "now"), on the dark board tile so the
       pin always reads (never teal-on-teal). -->
  <defs>
    <linearGradient id="wp-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#37b3a3" />
      <stop offset="1" stop-color="#1f7d73" />
    </linearGradient>
    <linearGradient id="wp-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2b65a" />
      <stop offset="1" stop-color="#e09a2f" />
    </linearGradient>
    <linearGradient id="wp-board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152137" />
      <stop offset="1" stop-color="#0e1729" />
    </linearGradient>
    <filter id="wp-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#wp-board)" />
  <!-- teal edge so the dark tile separates from a dark/busy ground -->
  <rect x="10" y="10" width="492" height="492" rx="108" fill="none" stroke="#3fb3a3" stroke-width="18" opacity="0.9" />
  <g transform="translate(256 262) scale(0.72) translate(-256 -260)">
    <path
      d="M256 44 C150 44 66 126 66 230 C66 348 206 436 256 476 C306 436 446 348 446 230 C446 126 362 44 256 44 Z"
      fill="url(#wp-teal)"
    />
    <path
      d="M256 44 C150 44 66 126 66 230 C66 348 206 436 256 476 C306 436 446 348 446 230 C446 126 362 44 256 44 Z"
      fill="none"
      stroke="#ffffff"
      stroke-opacity="0.14"
      stroke-width="6"
    />
    <circle cx="256" cy="222" r="120" fill="#0e1729" opacity="0.16" />
    <circle cx="256" cy="216" r="96" fill="none" stroke="#f2b65a" stroke-width="9" opacity="0.4" />
    <circle cx="256" cy="216" r="66" fill="#f2b65a" filter="url(#wp-glow)" opacity="0.7" />
    <circle cx="256" cy="216" r="60" fill="url(#wp-amber)" />
  </g>
</svg>
