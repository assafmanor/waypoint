<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Circular Waypoint mark for inline use on the dark chrome (Login/Join top
       bar, .land-icon / .join-icon which clip to a circle). Board-gradient disc
       so the teal marker + amber "now" core read against it. Matches favicon.svg. -->
  <defs>
    <linearGradient id="wpc-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#37b3a3" />
      <stop offset="1" stop-color="#1f7d73" />
    </linearGradient>
    <linearGradient id="wpc-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2b65a" />
      <stop offset="1" stop-color="#e09a2f" />
    </linearGradient>
    <linearGradient id="wpc-board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#182642" />
      <stop offset="1" stop-color="#0e1729" />
    </linearGradient>
    <filter id="wpc-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" />
    </filter>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#wpc-board)" />
  <!-- teal edge so the dark disc separates from a dark/busy ground -->
  <circle cx="256" cy="256" r="246" fill="none" stroke="#3fb3a3" stroke-width="18" opacity="0.9" />
  <g transform="translate(256 268) scale(0.66) translate(-256 -260)">
    <path
      d="M256 44 C150 44 66 126 66 230 C66 348 206 436 256 476 C306 436 446 348 446 230 C446 126 362 44 256 44 Z"
      fill="url(#wpc-teal)"
    />
    <path
      d="M256 44 C150 44 66 126 66 230 C66 348 206 436 256 476 C306 436 446 348 446 230 C446 126 362 44 256 44 Z"
      fill="none"
      stroke="#ffffff"
      stroke-opacity="0.16"
      stroke-width="6"
    />
    <circle cx="256" cy="216" r="96" fill="none" stroke="#f2b65a" stroke-width="9" opacity="0.42" />
    <circle cx="256" cy="216" r="66" fill="#f2b65a" filter="url(#wpc-glow)" opacity="0.7" />
    <circle cx="256" cy="216" r="60" fill="url(#wpc-amber)" />
  </g>
</svg>
